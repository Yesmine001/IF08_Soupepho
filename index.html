<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soupe Pho</title>

    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Feuille de style personnalisée -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- ============================== NAVBAR ============================== -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top" style="background-color: #8B0000;">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">🍜 Soupe Pho</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#hero">Accueil</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#ingredients">Ingrédients</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#etapes">Étapes</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ============================== HEADER / HERO ============================== -->
    <header id="hero" class="py-5" style="background-color: #fff3e0;">
        <div class="container text-center">

            <h1 class="display-3 fw-bold mb-3" style="color: #8B0000;">Soupe Pho</h1>

            <!-- Score nutritionnel moyen (rempli par js/main.js) -->
            <div id="nutrition-score" class="mb-4"></div>

            <!-- Image de la recette -->
            <img
                src="https://assets.afcdn.com/recipe/20180329/77517_w600.jpg"
                alt="Image d'une soupe pho"
                class="img-fluid rounded shadow"
                style="max-height: 420px; object-fit: cover; width: 100%;"
            >

        </div>
    </header>

    <!-- ============================== MAIN ============================== -->
    <main class="container my-5">

        <!-- Section Ingrédients -->
        <section id="ingredients" class="mb-5">
            <h2 class="mb-4 pb-2" style="border-bottom: 2px solid #8B0000; color: #8B0000;">🥢 Ingrédients</h2>
            <div id="productList" class="row g-4">
                <!-- Rempli dynamiquement par js/main.js -->
            </div>
        </section>

        <hr style="border-color: #8B0000;">

        <!-- Section Étapes -->
        <section id="etapes" class="mt-5">
            <h2 class="mb-4 pb-2" style="border-bottom: 2px solid #8B0000; color: #8B0000;">👨‍🍳 Étapes</h2>
            <div id="steps" class="list-group list-group-flush">
                <!-- Rempli dynamiquement par js/main.js -->
            </div>
        </section>

    </main>

    <!-- ============================== FOOTER ============================== -->
    <footer class="py-4 mt-5 text-light" style="background-color: #8B0000;">
        <div class="container">
            <p class="mb-1 fw-bold"><small>Chef de projet : Thomas CHARPENTIER</small></p>
            <p class="mb-1"><small>Soupe Pho &mdash; Projet équipe IF08</small></p>
            <p class="mb-0"><small><a href="https://www.marmiton.org" class="text-warning">Source : Marmiton</a></small></p>
        </div>
    </footer>

    <!-- Bootstrap 5.3 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Script principal -->
    <script src="js/main.js"></script>

</body>

</html>
